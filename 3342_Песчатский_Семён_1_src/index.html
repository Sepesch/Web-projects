<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тетрис - Вход</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        .container {
            background-color: #34495e;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
            width: 300px;
            text-align: center;
        }
        
        h1 {
            color: #e74c3c;
            margin-bottom: 20px;
        }
        
        input[type="text"] {
            font-family: Arial, sans-serif;
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
        }
        
        input[type="submit"] {
            font-family: Arial, sans-serif;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            margin-top: 10px;
        }
        
        input[type="submit"]:hover {
            background-color: #c0392b;
        }
    </style>
</head>
<body onload="readUsername()">
    <div class="container">
        <h1>Тетрис</h1>
        
        <form onsubmit="storeUsername(event)">
            <label>
                Введите имя:
            </label>
            <input type="text" id="username" placeholder="Имя пользователя" required>
            <input type="submit" value="Начать игру">
        </form>
    </div>

    <script>
        function storeUsername(event) {
            event.preventDefault();
            const usernameInput = document.getElementById('username');
            localStorage.setItem("tetris.username", usernameInput.value);
            window.location = "main.html";
        }

        function readUsername() {
            const usernameInput = document.getElementById('username');
            const savedUsername = localStorage.getItem("tetris.username");
            if (savedUsername) {
                usernameInput.value = savedUsername;
            }
        }
    </script>
</body>
</html>
