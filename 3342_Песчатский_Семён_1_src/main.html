<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тетрис - Игра</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #2c3e50;
            color: white;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        
        #game-container {
            display: flex;
            background-color: #34495e;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.3);
        }
        
        #game-board {
            border: 2px solid #e74c3c;
            background-color: #1a252f;
        }
        
        #info-panel {
            margin-left: 20px;
            width: 200px;
        }
        
        .panel-section {
            background-color: #2c3e50;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            text-align: center;
        }
        
        .panel-title {
            font-size: 14px;
            color: #95a5a6;
            margin-bottom: 5px;
        }
        
        .panel-value {
            font-size: 20px;
            font-weight: bold;
            color: #e74c3c;
        }
        
        button {
            font-family: Arial, sans-serif;
            background-color: #e74c3c;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 10px;
            font-size: 14px;
        }
        
        button:hover {
            background-color: #c0392b;
        }
        
        #controls {
            background-color: #2c3e50;
            padding: 10px;
            border-radius: 5px;
            margin-top: 15px;
        }
        
        #controls h3 {
            margin-top: 0;
            color: #e74c3c;
            font-size: 16px;
            text-align: center;
        }
        
        .control-item {
            margin: 8px 0;
            font-size: 14px;
        }
        
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="game-board" width="370" height="740"></canvas>
        
        <div id="info-panel">
            
            <div class="panel-section">
                <div class="panel-title">ИГРОК</div>
                <div id="username-display" class="panel-value">Гость</div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">СЧЕТ</div>
                <div id="score" class="panel-value">0</div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">УРОВЕНЬ</div>
                <div id="level" class="panel-value">1</div>
            </div>
            
            <div class="panel-section">
                <div class="panel-title">ЛИНИИ</div>
                <div id="lines" class="panel-value">0</div>
            </div>
            
            <button id="pause-btn" onclick="window.tetrisGame.togglePause()">Пауза</button>
            <button id="restart-btn" onclick="window.tetrisGame.resetGame()">Новая игра</button>
            <button id="records-btn" onclick="window.goToRecords()">Таблица рекордов</button>
            <button id="login-btn" onclick="goToLogin()">Сменить игрока</button>
            
            <div id="controls">
                <h3>УПРАВЛЕНИЕ:</h3>
                <div class="control-item">← → - Движение</div>
                <div class="control-item">↑ - Поворот</div>
                <div class="control-item">↓ - Ускорить</div>
                <div class="control-item">Пробел - Сбросить</div>
                <div class="control-item">P/Esc - Пауза</div>
            </div>
        </div>
    </div>

    <script>
       
        document.addEventListener('DOMContentLoaded', function() {
            const username = localStorage.getItem("tetris.username");
            if (username) {
                document.getElementById('username-display').textContent = username;
            }
        });
        function goToRecords() {
            window.location = "records.html";
        }

        function goToLogin() {
            window.location = "index.html";
        }
    </script>
    <script src="tetris.js"></script>
</body>
</html>
