<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Авторизация - Социальная сеть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="auth.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
</head>
<body class="auth-body">
    <!-- Основной контент -->
    <div class="container-fluid vh-100 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <!-- Форма авторизации по центру -->
            <div class="col-12 col-md-8 col-lg-6 col-xl-4">
                <div class="auth-container text-center">
                    <div class="text-center mb-5">
                        <i class="bi bi-people-fill display-1 text-primary mb-3"></i>
                        <h2 class="fw-bold text-primary mb-2">
                            Вход в систему
                        </h2>
                        <p class="text-muted">Введите свои учетные данные для доступа к аккаунту</p>
                    </div>

                    <!-- Сообщения об ошибках и успехе -->
                    <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ errorMessage }}
                    </div>

                    <div class="alert alert-success" *ngIf="successMessage" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        {{ successMessage }}
                    </div>

                    <!-- Форма входа -->
                    <form (ngSubmit)="onSubmit()" #form="ngForm" class="auth-form text-start">
                        <div class="mb-3">
                            <label for="email" class="form-label fw-bold">
                                <i class="bi bi-envelope-fill me-1"></i>
                                Email адрес
                            </label>
                            <input 
                                type="email" 
                                class="form-control form-control-lg" 
                                id="email" 
                                name="email" 
                                [(ngModel)]="loginData.email"
                                placeholder="Введите ваш email" 
                                required
                                [disabled]="isLoading">
                        </div>

                        <div class="mb-3">
                            <label for="password" class="form-label fw-bold">
                                <i class="bi bi-lock-fill me-1"></i>
                                Пароль
                            </label>
                            <div class="input-group">
                                <input 
                                    [type]="showPassword ? 'text' : 'password'" 
                                    class="form-control form-control-lg" 
                                    id="password" 
                                    name="password" 
                                    [(ngModel)]="loginData.password"
                                    placeholder="Введите ваш пароль" 
                                    required
                                    [disabled]="isLoading">
                                <button 
                                    type="button" 
                                    class="btn btn-outline-secondary"
                                    (click)="togglePasswordVisibility()"
                                    [disabled]="isLoading">
                                    <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                                </button>
                            </div>
                        </div>

                        <div class="row mb-4">
                            <div class="col-6">
                                <div class="form-check">
                                    <input 
                                        class="form-check-input" 
                                        type="checkbox" 
                                        id="remember" 
                                        name="remember" 
                                        [(ngModel)]="loginData.remember"
                                        [disabled]="isLoading">
                                    <label class="form-check-label" for="remember">
                                        Запомнить меня
                                    </label>
                                </div>
                            </div>
                        </div>

                        <button 
                            type="submit" 
                            class="btn btn-primary btn-lg w-100 mb-4"
                            [disabled]="isLoading || !form.valid"
                            [class.loading]="isLoading">
                            <span *ngIf="!isLoading">
                                <i class="bi bi-box-arrow-in-right me-2"></i>
                                Войти в систему
                            </span>
                            <span *ngIf="isLoading">
                                <i class="bi bi-arrow-repeat spinner me-2"></i>
                                Выполняется вход...
                            </span>
                        </button>
                    </form>

                    <!-- Регистрация -->
                    <div class="text-center">
                        <p class="text-muted mb-0">
                            Еще нет аккаунта? 
                            <a 
                                href="#" 
                                class="text-decoration-none fw-bold"
                                (click)="goToRegister(); $event.preventDefault()"
                                [class.disabled]="isLoading">
                                Зарегистрироваться
                            </a>
                        </p>
                    </div>

                    <!-- Тестовые данные -->
                    <div class="text-center mt-4">
                        <button 
                            type="button" 
                            class="btn btn-sm btn-outline-secondary"
                            (click)="fillTestCredentials()">
                            <i class="bi bi-key-fill me-1"></i>
                            Тестовые данные
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="auth-footer text-center text-muted py-3">
        <div class="container">
            <small>&copy; 2024 Социальная сеть. Все права защищены.</small>
        </div>
    </footer>
</body>
</html>
