<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - Социальная сеть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="reg.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
</head>
<body class="auth-body">
    <!-- Основной контент -->
    <div class="container-fluid py-4"> <!-- Изменили vh-100 на py-4 -->
        <div class="row justify-content-center">
            <!-- Форма регистрации по центру -->
            <div class="col-12 col-md-8 col-lg-6 col-xl-4">
                <div class="auth-container">
                    <!-- Заголовок -->
                    <div class="text-center mb-4">
                        <i class="bi bi-person-plus-fill text-primary mb-3" style="font-size: 3rem;"></i>
                        <h2 class="fw-bold text-primary mb-2">
                            Регистрация
                        </h2>
                        <p class="text-muted">Создайте новый аккаунт</p>
                    </div>

                    <!-- Сообщения об ошибках и успехе -->
                    <div class="alert alert-danger" *ngIf="errorMessage" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ errorMessage }}
                    </div>

                    <div class="alert alert-success" *ngIf="successMessage" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        {{ successMessage }}
                    </div>

                    <!-- Форма регистрации -->
                    <form (ngSubmit)="onSubmit()" #form="ngForm" class="auth-form">
                        <!-- Имя и фамилия -->
                        <div class="row mb-2">
                            <div class="col-6">
                                <label for="fullName" class="form-label fw-bold small">
                                    <i class="bi bi-person-fill me-1"></i>
                                    Имя и Фамилия
                                </label>
                                <input 
                                    type="text" 
                                    class="form-control form-control-sm" 
                                    id="fullName" 
                                    name="fullName" 
                                    [(ngModel)]="registerData.fullName"
                                    placeholder="Введите имя и Фамилию" 
                                    required
                                    [disabled]="isLoading">
                            </div>
                        </div>

                        <!-- Email -->
                        <div class="mb-2">
                            <label for="email" class="form-label fw-bold small">
                                <i class="bi bi-envelope-fill me-1"></i>
                                Email
                            </label>
                            <input 
                                type="email" 
                                class="form-control form-control-sm" 
                                id="email" 
                                name="email" 
                                [(ngModel)]="registerData.email"
                                placeholder="Введите email" 
                                required
                                [disabled]="isLoading">
                        </div>

                        <!-- Пароль -->
                        <div class="mb-2">
                            <label for="password" class="form-label fw-bold small">
                                <i class="bi bi-lock-fill me-1"></i>
                                Пароль
                            </label>
                            <div class="input-group input-group-sm">
                                <input 
                                    [type]="showPassword ? 'text' : 'password'" 
                                    class="form-control" 
                                    id="password" 
                                    name="password" 
                                    [(ngModel)]="registerData.password"
                                    placeholder="Пароль" 
                                    required
                                    [disabled]="isLoading"
                                    minlength="6">
                                <button 
                                    type="button" 
                                    class="btn btn-outline-secondary"
                                    (click)="togglePasswordVisibility()"
                                    [disabled]="isLoading">
                                    <i class="bi" [class.bi-eye]="!showPassword" [class.bi-eye-slash]="showPassword"></i>
                                </button>
                            </div>
                            <div class="form-text small">Минимум 6 символов</div>
                        </div>

                        <!-- Подтверждение пароля -->
                        <div class="mb-2">
                            <label for="confirmPassword" class="form-label fw-bold small">
                                <i class="bi bi-lock-fill me-1"></i>
                                Подтверждение
                            </label>
                            <input 
                                type="password" 
                                class="form-control form-control-sm" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                [(ngModel)]="registerData.confirmPassword"
                                placeholder="Повторите пароль" 
                                required
                                [disabled]="isLoading">
                        </div>

                        <!-- Дата рождения -->
                        <div class="mb-2">
                            <label for="birthDate" class="form-label fw-bold small">
                                <i class="bi bi-calendar-event me-1"></i>
                                Дата рождения
                            </label>
                            <input 
                                type="date" 
                                class="form-control form-control-sm" 
                                id="birthDate" 
                                name="birthDate" 
                                [(ngModel)]="registerData.birthDate"
                                required
                                [disabled]="isLoading">
                        </div>
                        <button 
                            type="submit" 
                            class="btn btn-primary w-100 mb-3"
                            [disabled]="isLoading || !form.valid">
                            <span *ngIf="!isLoading">
                                <i class="bi bi-person-plus me-2"></i>
                                Зарегистрироваться
                            </span>
                            <span *ngIf="isLoading">
                                <i class="bi bi-arrow-repeat spinner me-2"></i>
                                Регистрация...
                            </span>
                        </button>
                    </form>
                    <!-- Вход -->
                    <div class="text-center">
                        <p class="text-muted mb-0 small">
                            Уже есть аккаунт? 
                            <a 
                                href="#" 
                                class="text-decoration-none fw-bold"
                                (click)="goToLogin(); $event.preventDefault()"
                                [class.disabled]="isLoading">
                                Войти
                            </a>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="auth-footer text-center text-muted py-2">
        <div class="container">
            <small>&copy; Прав нет. Разрешаю воровать.</small>
        </div>
    </footer>
</body>
</html>
