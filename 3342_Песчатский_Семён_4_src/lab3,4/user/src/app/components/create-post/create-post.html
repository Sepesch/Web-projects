<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Создать пост - Социальная сеть</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.7.2/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="create-post.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>👥</text></svg>">
</head>
<body class="create-post-body">
    <!-- Ошибка -->
    <div id="errorSection" class="container-fluid py-4" style="display: none;">
        <div class="row justify-content-center">
            <div class="col-12">
                <div class="alert alert-danger" role="alert" id="errorMessage">
                    Сообщение об ошибке
                </div>
            </div>
        </div>
    </div>

    <!-- Основной контент -->
    <div id="mainContent" class="container-fluid py-4">
        <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
            <div class="container">
                <a class="navbar-brand fw-bold" href="/feed">
                    <i class="bi bi-people-fill me-2"></i>
                    Социальная сеть
                </a>
                
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="/feed" style="cursor: pointer;">
                        <i class="bi bi-arrow-left me-1"></i>
                        Назад к ленте
                    </a>
                    <a class="nav-link" id="logoutBtn" style="cursor: pointer;">
                        <i class="bi bi-box-arrow-right me-1"></i>
                        Выйти
                    </a>
                </div>
            </div>
        </nav>

        <div class="row justify-content-center mt-4">
            <div class="col-lg-8 col-md-10">
                <div class="create-post-card">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">
                            <i class="bi bi-plus-circle me-2"></i>
                            Создать новый пост
                        </h4>
                    </div>
                    
                    <div class="card-body">
                        <form id="postForm">
                            <div class="mb-4">
                                <label for="postContent" class="form-label fw-bold">Текст поста</label>
                                <textarea 
                                    class="form-control" 
                                    id="postContent" 
                                    rows="6" 
                                    placeholder="Что у вас нового?"
                                    [(ngModel)]="postContent"
                                    name="postContent"
                                    maxlength="1000"
                                    required>
                                </textarea>
                                <div class="form-text text-end">
                                    <span id="charCount">0</span>/1000 символов
                                </div>
                                <div id="contentError" class="text-danger small" style="display: none;">
                                    Пожалуйста, введите текст поста
                                </div>
                            </div>
                            <div class="d-flex gap-2 justify-content-end">
                                <button type="button" class="btn btn-outline-secondary" (click)="cancel()">
                                    Отмена
                                </button>
                                <button type="button" class="btn btn-primary" (click)="onSubmit()">
                                    Опубликовать
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="create-post.js"></script>
</body>
</html>
