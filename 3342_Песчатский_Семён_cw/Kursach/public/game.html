<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Стрелялка</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <h1>2D Стрелялка</h1>
        <div class="game-info">
            <p>Управление: A D - движение, Пробел — прыжок, Enter — стрельба</p>
            <p>Уровень: <span id="level">1</span> | Жизни: <span id="lives">3</span> | Очки: <span id="score">0</span></p>
        </div>
        
        <div class="game-window">
            <canvas id="gameCanvas" width="1440" height="800"></canvas>
        </div>

        <div class="controls">
            <button id="startBtn">Старт</button>
            <button id="pauseBtn">Пауза</button>
            <button id="resetBtn">Сброс</button>
        </div>
    </div>

    <!-- Спрятанные canvas для отрисовки тайлов и спрайтов -->
    <canvas id="tilesCanvas" style="display: none;"></canvas>
    <canvas id="spritesCanvas" style="display: none;"></canvas>

    <script src="js/utils/helper.js"></script>
    
    <script src="js/game/Entity.js"></script>
    <script src="js/game/Player.js"></script>
    <script src="js/game/Enemy.js"></script>
    <script src="js/game/Projectile.js"></script>
    <script src="js/game/Bonus.js"></script>
    
    <script src="js/managers/CanvasRenderer.js"></script>
    <script src="js/managers/GameM.js"></script>
    <script src="js/managers/SoundM.js"></script>
    <script src="js/managers/SpriteM.js"></script>
    <script src="js/managers/MapM.js"></script>
    <script src="js/managers/EventM.js"></script>
    
    <script src="js/main.js"></script>
</body>
</html>
